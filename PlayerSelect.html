<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>About Me: Jake Yatco</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    .background {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      z-index: -1;
    }

    .foreground {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .layered-image {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      height: 100%;
      transition: all 0.3s ease; /* Add transition for smooth effect */
    }

    .CivilEng {
      position: relative;
      height: 52%;
      top: 55%;
      left: 70%;
    }

    .CompSci {
      height: 52%;
      top: 31%;
      left: 30%;
    }

    .SousChef {
      height: 40%;
      top: 43%;
      left: 50%;
    }

    /* Hover effect for CivilEng and CompSci */
    .CivilEng:hover, .CompSci:hover, .SousChef:hover {
      transform: translate(-50%, -50%) scale(1.1); /* Slightly scale the image */
      filter: brightness(1.2); /* Increase brightness on hover */
    }

    /* Hide Layer 6 and 7 by default */
    .CE , .CIS, .CF{
      visibility: hidden; /* Hide by default */
      opacity: 0; /* Ensure it is fully transparent */
      transition: opacity 0.3s ease, visibility 0s 0.1s; /* Smooth transition */
    }

    .CivilEng:hover + .CE,
    .CompSci:hover + .CIS,
    .SousChef:hover + .CF{
      visibility: visible;
      opacity: 1;
    }

    @media (max-width: 1262px) and (min-width: 870px) {
      .layered-image {
        height: 80%;
      }

      .CivilEng, .CompSci {
        height: 40%;
      }

      .CivilEng {
        top: 54%;
        left: 65%;
      }

      .CompSci {
        top: 35%;
        left: 35%;
      }

      .SousChef {
        height: 30%;
        top: 45%;
        left: 50%;
      }

      
    }


    /* === Small Phones (max-width: 870px) === */
    @media (max-width: 870px) {
      .layered-image {
        height: 80%;
      }

      .CivilEng, .CompSci , .SousChef{
        height: 20%;
      }

      .CivilEng {
        top: 50%;
        left: 70%;
      }

      .CompSci {
        top: 40%;
        left: 30%;
      }

      .SousChef {
        top: 45%;
        left: 50.5%;
      }

      .PS {
        height: 40%;
        top: 38%;
      }


      .About {
        height: 60%;
        top: 40%;
        left: 10%;
        transform: none;
      }

      .CivilEng:hover + .CE,
      .CompSci:hover + .CIS,
      .SousChef:hover + .CF{
        visibility: hidden;
        opacity: 0;
      }


    }

  </style>
</head>
<body>

<!-- Background Image -->
<img src="./assets/playerSelect/BG.jpg" alt="Background" class="background">

<!-- Foreground Container for Layering -->
<div class="foreground">
  <img src="./assets/playerSelect/AboutMe.png" alt="Layer 1" class="layered-image About" style="z-index: 1;">
  <img src="./assets/playerSelect/Frame.png" alt="Layer 2" class="layered-image" style="z-index: 2;">
  <img src="./assets/playerSelect/PlayerSelect.png" alt="Layer 3" class="layered-image PS" style="z-index: 3;">

  <a href="SousChef.html">
    <img src="./assets/playerSelect/SousChef.png" class="layered-image SousChef" style="z-index: 80;">
    <img src="./assets/playerSelect/CF.png" class="layered-image CF" style="z-index: 5;">
  </a>

  <a href="CivilEngineer.html">
    <img src="./assets/playerSelect/CivilEng.png" class="layered-image CivilEng" style="z-index: 60;">
    <img src="./assets/playerSelect/CE.png" class="layered-image CE" style="z-index: 4;">
  </a>

  <a href="CompSci.html">
    <img src="./assets/playerSelect/CompSci.png" class="layered-image CompSci" style="z-index: 70;">
    <img src="./assets/playerSelect/CIS.png" class="layered-image CIS" style="z-index: 5;">
  </a>


</div>

</body>
</html>
