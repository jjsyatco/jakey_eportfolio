<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jake Yatco</title>
    <style>
        body, html {
          margin: 0;
          padding: 0;
          height: 100%;
          overflow: hidden;
        }

        .background {
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          min-width: 100%;
          min-height: 100%;
          z-index: -1;
        }

        .foreground {
          position: relative;
          width: 100%;
          height: 100%;
        }

        .layered-image {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          height: 100%;
          opacity: 0;
          animation: fadeInSlide 1.5s ease forwards;
        }

        .start-button {
          position: absolute;
          bottom: 1%;
          left: 50%;
          transform: translate(-50%, -50%);
          height: 6%;
          opacity: 0;
          animation: fadeInSlide 2.0s ease forwards;
        }

        .layered-image:nth-child(1) { animation-delay: 0.15s; }
        .layered-image:nth-child(2) { animation-delay: 0.10s; }
        .layered-image:nth-child(3) { animation-delay: 0.25s; }
        .layered-image:nth-child(4) { animation-delay: 0.35s; }
        .start-button { animation-delay: 0.35s; }

        @keyframes fadeInSlide {
          0% {
            opacity: 0;
            transform: translate(-50%, -40%); /* small offset */
          }
          100% {
            opacity: 1;
            transform: translate(-50%, -50%);
          }
        }

        /* Hover effect for StartButton */
        .start-button:hover {
            transform: translate(-50%, -50%) scale(1.1) !important;
            opacity: 1 !important;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- Background Image -->
<img src="./assets/index/BG.jpg" alt="Background" class="background">

<!-- Foreground Container for Layering -->
<div class="foreground">
    <img src="./assets/index/CivilEng.png" alt="Layer 1" class="layered-image" style="z-index: 1;">
    <img src="./assets/index/CompSci.png" alt="Layer 2" class="layered-image" style="z-index: 2;">
    <img src="./assets/index/Welcome.png" alt="Layer 3" class="layered-image" style="z-index: 3;">
    <img src="./assets/index/Border.png" alt="Layer 4" class="layered-image" style="z-index: 4;">
    <a href="PlayerSelect.html"><img src="./assets/index/StartButton.png" alt="Layer 5" class="start-button" style="z-index: 5;"></a>
</div>

</body>
</html>
