<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Home: Jake Yatco</title>
    <style>
        body, html {
          margin: 0;
          padding: 0;
          height: 100%;
          overflow: hidden;
        }

        .background {
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          min-width: 100%;
          min-height: 100%;
          z-index: -1;
        }

        .foreground {
          position: relative;
          width: 100%;
          height: 100%;
        }

        .layered-image {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          height: 90%;
          opacity: 0;
          animation: fadeInSlide 1.5s ease forwards;
        }

        .layered-imageC {
          position: absolute;
          top: 60%;
          left: 50%;
          transform: translate(-50%, -50%);
          height: 100%;
          opacity: 0;
          animation: fadeInSlide 1.5s ease forwards;
        }

        .layered-imageL {
          position: absolute;
          top: 50%;
          left: 60%;
          transform: translate(-50%, -50%);
          height: 100%;
          opacity: 0;
          animation: fadeInSlide 1.5s ease forwards;
        }

        .layered-imageR {
          position: absolute;
          top: 50%;
          left: 40%;
          transform: translate(-50%, -50%);
          height: 100%;
          opacity: 0;
          animation: fadeInSlide 1.5s ease forwards;
        }

        .start-button {
          position: absolute;
          bottom: 1%;
          left: 50%;
          transform: translate(-50%, -50%);
          height: 6%;
          opacity: 0;
          animation: fadeInSlide 2.0s ease forwards;
        }

        .layered-image:nth-child(1) { animation-delay: 0.15s; }
        .layered-image:nth-child(2) { animation-delay: 0.10s; }
        .layered-image:nth-child(3) { animation-delay: 0.25s; }
        .layered-image:nth-child(4) { animation-delay: 0.35s; }
        .start-button { animation-delay: 0.35s; }

        @keyframes fadeInSlide {
          0% {
            opacity: 0;
            transform: translate(-50%, -40%); /* small offset */
          }
          100% {
            opacity: 1;
            transform: translate(-50%, -50%);
          }
        }

        /* Hover effect for StartButton */
        .start-button:hover {
            transform: translate(-50%, -50%) scale(1.1) !important;
            opacity: 1 !important;
            cursor: pointer;
        }

        /* Music Button and Volume */
        .music-toggle-btn {
          position: absolute;
          top: 20px;
          right: 150px;
          background-color: rgba(0, 0, 0, 0.5);
          color: white;
          border: none;
          padding: 10px;
          border-radius: 50%;
          cursor: pointer;
          font-size: 20px;
          z-index: 200;
        }

        .music-toggle-btn:hover {
          background-color: rgba(0, 0, 0, 0.8);
        }

        .volume-slider {
          position: absolute;
          top: 20px;
          right: 20px;
          width: 120px;
          height: 5%;
          transform-origin: 50% 50%;
          z-index: 200;
        }

        .volume-slider::-webkit-slider-runnable-track,
        .volume-slider::-moz-range-track,
        .volume-slider::-ms-track {
          background: black;
          border-radius: 10px;
          height: 15px;
        }

        .volume-slider::-webkit-slider-thumb,
        .volume-slider::-moz-range-thumb,
        .volume-slider::-ms-thumb {
          appearance: none;
          background: black;
          border: 2px solid #000;
          border-radius: 50%;
          width: 20px;
          height: 20px;
          cursor: pointer;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .layered-image {
              height: 70%;
            }

            .layered-imageL {
              height: 70%;
              top: 45%;
            }

            .layered-imageC {
              height: 70%;
              top: 50%;
            }

            .layered-imageR {
              height: 70%;
              top: 45%;
            }

            .start-button {
              bottom: 15%;
              height: 5%;
            }


        }

        /* Extra small devices (phones) */
        @media (max-width: 500px) {
            .layered-image {
              height: 50%;
            }

            .layered-imageL {
              height: 50%;
              top: 45%
            }

            .layered-imageC {
              height: 50%;
              top: 50%;
            }

            .layered-imageR {
              height: 50%;
              top: 45%;
            }

            .start-button {
              bottom: 24%;
              height: 4%;
            }


        }

    </style>
</head>
<body>

<!-- Background Music -->
<audio id="background-music" preload="auto" loop>
    <source src="./assets/BGMusic.mp3" type="audio/mp3">
    Your browser does not support the audio element.
</audio>

<!-- Music Toggle Button -->
<button class="music-toggle-btn" id="music-toggle-btn">
    <span id="music-icon">🔊</span>
</button>

<!-- Volume Control -->
<input type="range" class="volume-slider" id="volume-control" min="0" max="1" step="0.01" value="1">

<!-- Background Image -->
<img src="./assets/index/BG.jpg" alt="Background" class="background">

<!-- Foreground Container for Layering -->
<div class="foreground">
    <img src="./assets/index/CivilEng.png" alt="Layer 1" class="layered-imageL" style="z-index: 1;">
    <img src="./assets/index/CompSci.png" alt="Layer 2" class="layered-imageR" style="z-index: 2;">
    <img src="./assets/index/SousChef.png" alt="Layer 2" class="layered-imageC" style="z-index: 3;">
    <img src="./assets/index/Welcome.png" alt="Layer 3" class="layered-image" style="z-index: 4;">
    <img src="./assets/index/Border.png" alt="Layer 4" class="layered-image" style="z-index: 5;">
    <a href="PlayerSelect.html" target="_blank"><img src="./assets/index/StartButton.png" alt="Layer 5" class="start-button" style="z-index: 6;"></a>
</div>

<!-- JavaScript for Music Control -->
<script>
    window.addEventListener('load', () => {
        const musicPlayer = document.getElementById('background-music');
        const musicToggleBtn = document.getElementById('music-toggle-btn');
        const volumeControl = document.getElementById('volume-control');
        const musicIcon = document.getElementById('music-icon');

        // Play the music as soon as the page is loaded
        musicPlayer.play().then(() => {
            // Music is successfully playing
        }).catch((error) => {
            // If auto-play fails, log the error
            console.log("Autoplay failed:", error);
        });

        // Music Toggle Button click functionality
        musicToggleBtn.addEventListener('click', () => {
            if (musicPlayer.paused) {
                musicPlayer.play();
                musicIcon.textContent = "🔊";
            } else {
                musicPlayer.pause();
                musicIcon.textContent = "🔇";
            }
        });

        // Volume Control functionality
        volumeControl.addEventListener('input', (e) => {
            musicPlayer.volume = e.target.value;
        });
    });
</script>


</body>
</html>
